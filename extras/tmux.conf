# Da Vinci Console — tmux binding
# Add this to your ~/.config/tmux/tmux.conf or ~/.tmux.conf
#
# Adjust the path if you installed to a different location.

bind s run-shell "bash ~/.config/tmux/sesh_picker.sh"

# Optional: set your theme via environment variables before launching
# (set-environment makes them available inside the run-shell call)
#
# set-environment -g DVC_COLOR_ACTIVE "#14E21A"
# set-environment -g DVC_COLOR_BORDER "#24b030"
# set-environment -g DVC_COLOR_DIM    "#333333"
# set-environment -g DVC_TITLE        " 󰔎 Da Vinci Console "
